
services:
  uniro_v1_bot:
    image: uniro_v1:latest
    hostname: uniro_v1_host
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ROS_DISTRO: humble
      # target: uniro_v1_bot
    command: sh
    restart: always
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host
    # runtime: nvidia ##FIXME:
    # gpus: all  
    privileged: true
    environment:
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      - DISPLAY=unix$DISPLAY
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_DRIVER_CAPABILITIES=all
      # - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority
      - /run/user/1000/pulse:/run/user/1000/pulse
      - /dev/snd:/dev/snd
      - /dev/shm:/dev/shm
      - /dev/dsp:/dev/dsp
      - /dev:/dev
      - ./:/robot/
    devices:
      - /dev/dsp:/dev/dsp
      - /dev/snd:/dev/snd
      - /dev/vcsm:/dev/vcsm
  ##################################################








